version: '3.8'

services:
  # Development Database
  postgres-dev:
    image: postgres:15
    container_name: ml-platform-postgres-dev
    environment:
      POSTGRES_DB: ml_platform_dev
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-platform-network

  # Redis for Feature Store
  redis-dev:
    image: redis:7-alpine
    container_name: ml-platform-redis-dev
    command: redis-server --appendonly yes --requirepass admin
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-platform-network

  # MLflow Tracking Server
  mlflow-dev:
    image: ghcr.io/mlflow/mlflow:v2.4.1
    container_name: ml-platform-mlflow-dev
    command: >
      mlflow server
      --backend-store-uri postgresql://admin:admin@postgres-dev:5432/ml_platform_dev
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://minio-dev:9000
    depends_on:
      postgres-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
    networks:
      - ml-platform-network

  # MinIO for S3-compatible storage
  minio-dev:
    image: minio/minio:latest
    container_name: ml-platform-minio-dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ml-platform-network

  # Jupyter Lab for development
  jupyter-dev:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: ml-platform-jupyter-dev
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
      - ./ml:/home/jovyan/ml
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_TRACKING_URI: http://mlflow-dev:5000
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      REDIS_PASSWORD: admin
      POSTGRES_HOST: postgres-dev
      POSTGRES_PORT: 5432
      POSTGRES_DB: ml_platform_dev
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    command: >
      start-notebook.sh
      --NotebookApp.token=''
      --NotebookApp.password=''
      --NotebookApp.allow_origin='*'
      --NotebookApp.base_url=/jupyter
    networks:
      - ml-platform-network

  # Feast Feature Store
  feast-dev:
    build:
      context: .
      dockerfile: Dockerfile.feast
    container_name: ml-platform-feast-dev
    volumes:
      - ./ml/feast:/app/feature_repo
    depends_on:
      - redis-dev
      - postgres-dev
    command: >
      bash -c "
        feast apply &&
        feast materialize-incremental $(date -u +'%Y-%m-%dT%H:%M:%S') &&
        tail -f /dev/null
      "
    networks:
      - ml-platform-network

  # Local development API
  api-dev:
    build:
      context: ./src/python/ml-service
      dockerfile: Dockerfile.dev
    container_name: ml-platform-api-dev
    ports:
      - "8080:8080"
    volumes:
      - ./src/python/ml-service:/app
      - ./notebooks:/app/notebooks
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      MLFLOW_TRACKING_URI: http://mlflow-dev:5000
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      REDIS_PASSWORD: admin
      POSTGRES_HOST: postgres-dev
      POSTGRES_PORT: 5432
      POSTGRES_DB: ml_platform_dev
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT_URL: http://minio-dev:9000
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8080 --reload
    depends_on:
      - mlflow-dev
      - redis-dev
      - postgres-dev
      - minio-dev
    networks:
      - ml-platform-network

networks:
  ml-platform-network:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev: