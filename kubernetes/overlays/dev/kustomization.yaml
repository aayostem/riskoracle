apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ml-platform

resources:
  - ../../base

patchesStrategicMerge:
  - patches/resource-limits.yaml
  - patches/replicas.yaml

configMapGenerator:
  - name: ml-platform-config
    files:
      - configs/database-config.yaml
      - configs/redis-config.yaml
      - configs/s3-config.yaml

secretGenerator:
  - name: ml-platform-secrets
    envs:
      - .env.secret
    options:
      disableNameSuffixHash: true

images:
  - name: mlflow
    newName: ghcr.io/mlflow/mlflow
    newTag: v2.4.1
  - name: jupyter
    newName: jupyter/tensorflow-notebook
    newTag: latest
  - name: redis
    newName: redis
    newTag: 7-alpine

vars:
  - name: MLFLOW_IAM_ROLE_ARN
    objref:
      kind: ConfigMap
      name: ml-platform-config
      apiVersion: v1
    fieldref:
      fieldpath: data.MLFLOW_IAM_ROLE_ARN
