apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: ml-platform
  labels:
    app: jupyter
    component: notebook-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupyter
  template:
    metadata:
      labels:
        app: jupyter
    spec:
      containers:
      - name: jupyter
        image: jupyter/tensorflow-notebook:latest
        command: ["start-notebook.sh"]
        args:
          - "--NotebookApp.token=''"
          - "--NotebookApp.password=''"
          - "--NotebookApp.allow_origin='*'"
          - "--NotebookApp.base_url=/jupyter"
        env:
        - name: JUPYTER_ENABLE_LAB
          value: "yes"
        ports:
        - containerPort: 8888
          name: http
        livenessProbe:
          httpGet:
            path: /api
            port: 8888
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: notebooks
          mountPath: /home/jovyan/work
        - name: data
          mountPath: /home/jovyan/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
      volumes:
      - name: notebooks
        persistentVolumeClaim:
          claimName: notebooks-pvc
      - name: data
        persistentVolumeClaim:
          claimName: data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notebooks-pvc
  namespace: ml-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: ml-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter
  namespace: ml-platform
spec:
  selector:
    app: jupyter
  ports:
  - port: 8888
    targetPort: 8888
    name: http
  type: ClusterIP
