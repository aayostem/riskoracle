apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ml-platform
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: ml-platform
spec:
  replicas: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-service
  namespace: ml-platform
spec:
  replicas: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-monitoring
  namespace: ml-platform
spec:
  replicas: 2
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ml-platform
spec:
  replicas: 3
  serviceName: redis
  updateStrategy:
    type: RollingUpdate
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mlflow-hpa
  namespace: ml-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mlflow
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
