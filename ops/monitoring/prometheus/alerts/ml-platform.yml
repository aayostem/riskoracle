groups:
  - name: ml-platform
    rules:
      - alert: MLFlowDown
        expr: up{job="mlflow"} == 0
        for: 5m
        labels:
          severity: critical
          service: mlflow
        annotations:
          summary: "MLFlow tracking server is down"
          description: "MLFlow server has been down for more than 5 minutes"
      
      - alert: JupyterDown
        expr: up{job="jupyter"} == 0
        for: 5m
        labels:
          severity: critical
          service: jupyter
        annotations:
          summary: "Jupyter server is down"
          description: "Jupyter server has been down for more than 5 minutes"
      
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis server has been down for more than 2 minutes"
      
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% for 5 minutes"
      
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for 5 minutes"
