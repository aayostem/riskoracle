apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: ml-platform-required-labels
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - ml-platform
  parameters:
    labels:
      - "app.kubernetes.io/name"
      - "app.kubernetes.io/component"
